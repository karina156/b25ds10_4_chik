<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404: страница не найдена</title>
    <link rel="stylesheet" href="stylesheets/layout.css" />
    <script defer src="javascripts/404.js"></script>
  </head>
  <body>
    <header class="header">
      <input type="checkbox" id="burger-toggle" class="burger-toggle" />

      <label for="burger-toggle" class="burger">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <a href="index.html" class="logo">
        <img src="./images/logo.svg" alt="лого" />
      </a>

      <nav class="menu">
        <a href="about-party.html">О вечеринке</a>
        <a href="party.html">Вечеринка</a>
        <a href="programm.html">Программа</a>
        <a href="line-up.html">Лайн-ап</a>
        <a href="map.html">Карта</a>
        <a href="merch.html">Мерч</a>
        <a href="CHIK-KIDS.html">CHIK KIDS</a>
        <a href="CHIK PLATFORM.html">CHIK PLATFORM</a>
      </nav>
      <a class="ticket-btn open-ticket-modal"> Купить билет </a>
    </header>
    <section class="error-page">
      <p class="error-text">
        Кажется, такой страницы<br />
        не существует...
      </p>

      <img class="error-image" src="./images/404.svg" alt="404" />

      <a
        href="#"
        class="error-button"
        onclick="
          history.back();
          return false;
        "
      >
        Вернуться
      </a>
    </section>
    <div class="ticket-modal">
      <div class="ticket-modal-content">
        <button class="ticket-modal-close">✕</button>

        <h2>Купить билет</h2>

        <form class="ticket-form">
          <input type="text" placeholder="Ваше имя" required />

          <input type="email" placeholder="E-mail" required />

          <input type="tel" placeholder="Телефон" required />

          <select required>
            <option value="">Выберите билет</option>
            <option>Стандарт</option>
            <option>ВИПчик</option>
            <option>Бэкстейж</option>
          </select>

          <button type="submit" class="ticket-form-btn">Отправить</button>
        </form>
      </div>
    </div>
  </body>
</html>
